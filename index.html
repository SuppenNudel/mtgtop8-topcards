<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Top Cards Explorer</title>
    <meta
      name="description"
      content="Explore MTG format staples with filtering and sortable stats."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blur bg-blur-a" aria-hidden="true"></div>
    <div class="bg-blur bg-blur-b" aria-hidden="true"></div>

    <header class="hero">
      <p class="eyebrow">MTGTOP8 FORMAT STAPLES</p>
      <h1>Card Staples Explorer</h1>
      <p class="hero-subtitle">
        Browse staple cards across Standard, Pioneer, Modern, Legacy, and Pauper.
        Filter fast. Sort anything. Compare board presence at a glance.
      </p>
    </header>

    <main class="layout">
      <section class="panel controls" aria-label="Filters">
        <div class="controls-grid">
          <label>
            <span>Format</span>
            <select id="formatFilter">
              <option value="all">All formats</option>
            </select>
          </label>

          <label>
            <span>Search card</span>
            <input
              id="searchFilter"
              type="text"
              placeholder="Lightning Bolt, Brainstorm, ..."
            />
          </label>

          <label>
            <span>Board filter</span>
            <select id="boardFilter">
              <option value="either">Either board</option>
              <option value="main">Mainboard only</option>
              <option value="side">Sideboard only</option>
              <option value="both">Main + side</option>
            </select>
          </label>

          <label>
            <span>Min decks share (%)</span>
            <input id="minDeckShare" type="number" min="0" max="100" step="0.1" value="0" />
          </label>

          <label>
            <span>Min avg copies</span>
            <input id="minAvgCopies" type="number" min="0" max="10" step="0.1" value="0" />
          </label>

          <label>
            <span>Rows</span>
            <select id="rowLimit">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="250">250</option>
              <option value="0">All</option>
            </select>
          </label>
        </div>

        <div class="meta-row">
          <p id="statusText" class="status">Loading data...</p>
          <button id="resetFilters" class="ghost-btn" type="button">Reset filters</button>
        </div>
      </section>

      <section class="panel table-panel" aria-label="Staples table">
        <div class="table-wrap">
          <table id="cardsTable">
            <thead>
              <tr>
                <th><button class="sort-btn" data-sort="format" type="button">Format</button></th>
                <th><button class="sort-btn" data-sort="cardname" type="button">Card</button></th>
                <th><button class="sort-btn" data-sort="mainDecks" type="button">Main decks %</button></th>
                <th><button class="sort-btn" data-sort="mainAvg" type="button">Main avg</button></th>
                <th><button class="sort-btn" data-sort="sideDecks" type="button">Side decks %</button></th>
                <th><button class="sort-btn" data-sort="sideAvg" type="button">Side avg</button></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="emptyRowTpl">
      <tr>
        <td colspan="6" class="empty-cell">No cards match the current filters.</td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
